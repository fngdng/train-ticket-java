server:
  port: 8082

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/train_ticket}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    validate-on-migrate: false
    table: flyway_bookings_history
    baseline-on-migrate: true
    baseline-version: 0

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://auth-service:8080}

momo:
  test-mode: true
  partner-code: ${MOMO_PARTNER_CODE:MOMOAFDF20231115}
  access-key: ${MOMO_ACCESS_KEY:F8590A51A5A2CA5A}
  secret-key: ${MOMO_SECRET_KEY:fc6c7d6f367cd302330b038fbb16a05e}
  endpoint: ${MOMO_ENDPOINT:https://test-payment.momo.vn/v3/gateway/api/create}
  return-url: ${MOMO_RETURN_URL:http://localhost:3000/booking.html}
  notify-url: ${MOMO_NOTIFY_URL:http://localhost:8082/payments/momo/callback}

