limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
resolver 127.0.0.11 valid=30s ipv6=off;

# Upstream blocks (ready for horizontal scaling with docker compose --scale)
upstream auth_backend {
    zone auth_backend 64k;
    least_conn;
    server auth-service:8080 resolve;
    keepalive 32;
}

upstream trains_backend {
    zone trains_backend 64k;
    least_conn;
    server trains-service:8081 resolve;
    keepalive 32;
}

upstream bookings_backend {
    zone bookings_backend 64k;
    least_conn;
    server bookings-service:8082 resolve;
    keepalive 64;
}

server {
    listen 80;
    server_name localhost;

    # Basic hardening / WAF-lite controls
    client_max_body_size 2m;
    limit_req_status 429;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy auth endpoints to auth-service
    location /auth/ {
        limit_req zone=auth_limit burst=20 nodelay;
        proxy_pass http://auth_backend/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Proxy trains endpoints
    location /trains/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass http://trains_backend/trains/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Proxy bookings endpoints
    location = /bookings {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass http://bookings_backend/bookings;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location /bookings/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass http://bookings_backend/bookings/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Proxy payment endpoints
    location /payments/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass http://bookings_backend/payments/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Proxy ticket endpoints
    location /tickets/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass http://bookings_backend/tickets/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    error_page 404 /index.html;
}

