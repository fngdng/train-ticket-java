spring:
  datasource:
    url: jdbc:postgresql://db:5432/train_ticket
    username: postgres
    password: postgres
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
    table: flyway_auth_history
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

bootstrap:
  admin:
    secret: ${BOOTSTRAP_ADMIN_SECRET:}
server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: INFO
